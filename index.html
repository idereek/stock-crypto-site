<!DOCTYPE html>
<html lang="mn" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title data-i18n="page_title">Зоос — Хувьцаа, крипто мэдээллийн терминал</title>
<meta name="description" content="Хувьцаа, крипто, ханшийн live мэдээлэл — 100% Монгол хэлээр">
<link rel="stylesheet" href="style.css">
</head>
<script src="bank-rates.js"></script>
<script src="world-clocks.js"></script>
<body class="notranslate" translate="no">

<div class="ticker-tape" aria-hidden="true">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<header class="topbar">
  <div class="brand">
    <svg class="brand-mark" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 24 L6 18 L12 18 L12 24" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M14 24 L14 12 L20 12 L20 24" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M22 24 L22 7 L28 7 L28 24" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M22 7 L25 2 L28 7" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" class="brand-flame"/>
    </svg>
    <span class="brand-name">ЗООС</span>
  </div>
  <nav class="topnav">
    <a href="#" class="nav-link active" data-i18n="nav_terminal" id="navTerminal">Терминал</a>
    <a href="#" class="nav-link" data-i18n="nav_news">Мэдээ</a>
    <a href="#" class="nav-link" data-i18n="nav_watchlist" id="navWatchlist">Watchlist</a>
  </nav>
  <div class="topbar-actions">
    <div class="lang-switcher" id="langSwitcher">
      <button class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false">
        <span class="lang-globe" aria-hidden="true">🌐</span><span id="langCode">MN</span><span class="lang-caret" aria-hidden="true">▾</span>
      </button>
      <div class="lang-menu" id="langMenu">
        <button class="lang-option" data-lang="mn" type="button"><span class="lang-code-badge">MN</span> Монгол</button>
        <button class="lang-option" data-lang="en" type="button"><span class="lang-code-badge">EN</span> English</button>
      </div>
    </div>
    <div class="auth-actions" id="authActionsLoggedOut">
      <button class="btn-login" id="loginBtn" data-i18n="btn_login" type="button">Нэвтрэх</button>
      <button class="btn-signup" id="signupBtn" data-i18n="btn_signup" type="button">Бүртгүүлэх</button>
    </div>
    <div class="auth-actions" id="authActionsLoggedIn" style="display:none;">
      <span class="user-email" id="userEmailLabel"></span>
      <button class="btn-login" id="logoutBtn" data-i18n="btn_logout" type="button">Гарах</button>
    </div>
    <button class="btn-upgrade" id="upgradeBtn">Trial: 2 өдөр үлдлээ</button>
  </div>
</header>

<main>
  <section class="hero">
    <h1 class="hero-title">
      <span data-i18n="hero_pre">Хөрөнгийн зах зээлийг </span><span class="accent-text" data-i18n="hero_accent">эх хэлээрээ</span><span data-i18n="hero_post"> уншъя</span>
    </h1>
    <p class="eyebrow" data-i18n="eyebrow">Ticker эсвэл нэрээр хайх — жишээ: AAPL эсвэл Apple, BTC эсвэл Bitcoin</p>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" class="search-input" data-i18n-placeholder="search_placeholder" placeholder="Хайх..." autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
    </div>
    <div class="hero-strip" id="heroStrip" aria-hidden="true"></div>
  </section>

  <section id="resultArea" class="result-area">
    <div class="empty-state">
      <svg class="empty-glyph" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 24 L6 18 L12 18 L12 24" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M14 24 L14 12 L20 12 L20 24" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        <path d="M22 24 L22 7 L28 7 L28 24" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </svg>
      <p data-i18n="empty_state">Дээрх талбарт ticker буюу компанийн нэрээ бичээд хайлт хийнэ үү.</p>
      <div class="quick-picks">
        <button class="chip" data-q="BTC">₿ Bitcoin</button>
        <button class="chip" data-q="ETH">Ξ Ethereum</button>
        <button class="chip" data-q="AAPL">Apple</button>
        <button class="chip" data-q="TSLA">Tesla</button>
      </div>
    </div>
  </section>
</main>

<div class="modal-overlay" id="authModalOverlay">
  <div class="modal-box" id="authModalBox">
    <button class="modal-close" id="authModalClose" aria-label="Хаах" type="button">✕</button>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabLogin" data-tab="login" data-i18n="btn_login" type="button">Нэвтрэх</button>
      <button class="modal-tab" id="tabSignup" data-tab="signup" data-i18n="btn_signup" type="button">Бүртгүүлэх</button>
    </div>
    <form id="authForm">
      <label class="modal-label" data-i18n="auth_email_label">Имэйл</label>
      <input type="email" id="authEmail" class="modal-input" required autocomplete="email" placeholder="tanhi@jishee.mn">
      <label class="modal-label" data-i18n="auth_password_label">Нууц үг</label>
      <input type="password" id="authPassword" class="modal-input" required autocomplete="current-password" minlength="6" placeholder="••••••••">
      <div class="modal-error" id="authError"></div>
      <div class="modal-success" id="authSuccess"></div>
      <button type="submit" class="modal-submit" id="authSubmitBtn" data-i18n="btn_login">Нэвтрэх</button>
    </form>
  </div>
</div>

<footer class="sitefooter">
  <span data-i18n="footer_text">© 2026 Зоос — Монгол хэл дээрх санхүүгийн терминал</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="data.js"></script>
<script src="i18n.js"></script>
<script src="auth.js"></script>
<script src="analysis.js"></script>
<script src="script.js"></script>
</body>
</html>
